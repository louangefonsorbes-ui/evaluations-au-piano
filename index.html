<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Adorateurs de Fonsorbes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-screen" id="loginScreen">

    <div class="login-card">

        <h1>Les Adorateurs de Fonsorbes</h1>

        <p>Veuillez entrer votre identifiant :</p>

        <input
            type="text"
            id="identifiant"
            placeholder="">

        <br><br>

        <button onclick="connexion()">
            Se connecter
        </button>

    </div>

</div>

<div class="app" id="appShell" style="display:none;">

    <nav class="sidebar">

        <div class="sidebar-title">Les Adorateurs de Fonsorbes</div>

        <button class="nav-btn" data-tab="cours">Cours</button>
        <button class="nav-btn" data-tab="repertoire">Répertoire</button>
        <button class="nav-btn" data-tab="membres">Membres</button>
        <button class="nav-btn" data-tab="programmes">Programmes</button>
        <button class="nav-btn" data-tab="lead">Lead</button>
        <button class="nav-btn active" data-tab="piano">Évaluation Piano</button>

    </nav>

    <div class="main">

        <header class="topbar">
            <div class="session-info">
                <span id="sessionNom"></span>
                <button class="btn-deconnexion" onclick="deconnexion()">Déconnexion</button>
            </div>
        </header>

        <div class="main-content">

            <div class="tab-content" id="tab-cours" style="display:none;">
                <p class="bientot-disponible">Bientôt disponible.</p>
            </div>

            <div class="tab-content" id="tab-repertoire" style="display:none;">
                <p class="bientot-disponible">Bientôt disponible.</p>
            </div>

            <div class="tab-content" id="tab-membres" style="display:none;">
                <p class="bientot-disponible">Bientôt disponible.</p>
            </div>

            <div class="tab-content" id="tab-programmes" style="display:none;">
                <p class="bientot-disponible">Bientôt disponible.</p>
            </div>

            <div class="tab-content" id="tab-lead" style="display:none;">
                <p class="bientot-disponible">Bientôt disponible.</p>
            </div>

            <div class="tab-content" id="tab-piano">

                <h2 id="nom"></h2>

                <p>
                    <strong>Évaluation disponible</strong><br>
                    Séance du 27 juin 2026
                </p>

                <div style="border:1px solid #000000; border-radius:4px; padding:10px; text-align:center; margin:10px auto;width:fit-content;">
                    <h3 style="margin:0;color:#000000;">Résultat général :</h3>
                    <h2 id="note" style="text-align:center;margin:5px 0;font-size:28px;"></h2>
                </div>

                <div id="contenu"></div>

            </div>

        </div>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="script.js"></script>

</body>
</html>
